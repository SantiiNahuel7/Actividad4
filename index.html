<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad - Colaborador A</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="formulario_container">
        <form id="miFormulario" class="formulario" method="get" action="datos.html">
            
            <h2>Registro de Usuario</h2>

            <div class="grupo-input">
                <label for="nombre">Nombre: </label>
                <input type="text" id="nombre" name="nombre" placeholder="Mínimo 5 caracteres">
                <p id="error-nombre" class="mensaje-error" style="display:none; color:red;">* El nombre debe tener al menos 5 caracteres.</p>
            </div>

            <div class="grupo-input">
                <label for="email">Email: </label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com">
                <p id="error-email" class="mensaje-error" style="display:none; color:red;">* Ingrese un formato de email válido.</p>
            </div>

            <div class="grupo-input">
                <label for="edad">Edad: </label>
                <input type="number" id="edad" name="edad" placeholder="Entre 18 y 60 años">
                <p id="error-edad" class="mensaje-error" style="display:none; color:red;">* La edad debe estar entre 18 y 60 años.</p>
            </div>

            <div class="grupo-input">
                <label for="pais">País: </label>
                <select id="pais" name="pais">
                    <option value="" disabled selected>Seleccione un país...</option>
                    <option value="argentina">Argentina</option>
                    <option value="brasil">Brasil</option>
                    <option value="chile">Chile</option>
                    <option value="colombia">Colombia</option>
                    <option value="uruguay">Uruguay</option>
                </select>
                <p id="error-pais" class="mensaje-error" style="display:none; color:red;">* Debe seleccionar un país.</p>
            </div>

            <div class="terminos_y_condiciones">
                <input type="checkbox" id="terminos" name="terminos">
                <label for="terminos">Acepto los términos y condiciones</label>
                <p id="error-terminos" class="mensaje-error" style="display:none; color:red;">* Debe aceptar los términos.</p>
            </div>
            
            <button type="submit">Enviar Datos</button>

        </form>
    </main>

    <script src="./script.js"></script>
</body>
</html>
